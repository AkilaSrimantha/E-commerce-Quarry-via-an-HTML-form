<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Commerce Query Form</title>
  <link rel="stylesheet" href="style.css" />

  <!-- EmailJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="form-card">
      <h1>E-Commerce Query Form</h1>
      <p class="subtitle">Submit your product or order query below.</p>

      <form id="queryForm">
        <div class="form-group">
          <label for="userName">Full Name</label>
          <input type="text" id="userName" name="userName" placeholder="Enter your full name" required />
        </div>

        <div class="form-group">
          <label for="userEmail">Email Address</label>
          <input type="email" id="userEmail" name="userEmail" placeholder="Enter your email address" required />
        </div>

        <div class="form-group">
          <label for="querySubject">Subject</label>
          <input type="text" id="querySubject" name="querySubject" placeholder="Enter query subject" required />
        </div>

        <div class="form-group">
          <label for="queryMessage">Message</label>
          <textarea id="queryMessage" name="queryMessage" rows="5" placeholder="Type your query here..." required></textarea>
        </div>

        <button type="submit" id="submitBtn">Submit Query</button>

        <p id="statusMessage"></p>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
